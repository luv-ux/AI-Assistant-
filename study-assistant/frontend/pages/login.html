<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyMind — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e2a;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6ef7;
    --accent2: #4ecdc4;
    --text: #edeef2;
    --muted: #7a7f94;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
  }

  .left {
    flex: 1;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px;
    position: relative;
    overflow: hidden;
  }

  .left::before {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,110,247,0.15), transparent 70%);
    top: -100px; left: -100px;
  }

  .left::after {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(78,205,196,0.1), transparent 70%);
    bottom: -80px; right: -80px;
  }

  .brand {
    font-family: 'Syne', sans-serif;
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }

  .brand span { color: var(--accent); }

  .tagline {
    font-size: 16px;
    color: var(--muted);
    text-align: center;
    max-width: 300px;
    line-height: 1.6;
    position: relative;
    z-index: 1;
  }

  .features {
    margin-top: 48px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 320px;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .feature-icon {
    font-size: 24px;
    flex-shrink: 0;
  }

  .feature-text p { font-size: 14px; font-weight: 500; }
  .feature-text span { font-size: 12px; color: var(--muted); }

  /* Right - Form */
  .right {
    width: 480px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 56px;
  }

  .form-title {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 8px;
  }

  .form-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 36px;
  }

  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }

  .tab {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent);
    color: white;
  }

  .form-group { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--muted);
  }

  input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .forgot {
    display: block;
    text-align: right;
    font-size: 12px;
    color: var(--accent);
    margin-top: 6px;
    cursor: pointer;
    text-decoration: none;
  }

  .submit-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
  }

  .submit-btn:hover { background: #6a5ee0; transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: var(--muted);
    font-size: 12px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .google-btn {
    width: 100%;
    padding: 12px;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: border-color 0.2s;
  }

  .google-btn:hover { border-color: rgba(255,255,255,0.2); }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .right { animation: fadeUp 0.4s ease; }

  @media (max-width: 800px) {
    .left { display: none; }
    .right { width: 100%; padding: 40px 28px; }
  }
</style>
</head>
<body>

<div class="left">
  <div class="brand">Study<span>Mind</span></div>
  <p class="tagline">Apna AI study partner — jo kabhi thakta nahi 🚀</p>

  <div class="features">
    <div class="feature">
      <div class="feature-icon">🤖</div>
      <div class="feature-text">
        <p>AI Tutor</p>
        <span>Koi bhi doubt instantly solve karo</span>
      </div>
    </div>
    <div class="feature">
      <div class="feature-icon">📅</div>
      <div class="feature-text">
        <p>Smart Planner</p>
        <span>Study schedule automatically banao</span>
      </div>
    </div>
    <div class="feature">
      <div class="feature-icon">📈</div>
      <div class="feature-text">
        <p>Progress Tracker</p>
        <span>Apni growth track karo daily</span>
      </div>
    </div>
  </div>
</div>

<div class="right">
  <div class="form-title">Welcome back 👋</div>
  <p class="form-sub">Apne account mein login karo</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login', this)">Login</button>
    <button class="tab" onclick="switchTab('register', this)">Register</button>
  </div>

  <!-- Login Form -->
  <div id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="tumhari@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" placeholder="••••••••">
      <a class="forgot" href="#">Password bhool gaye?</a>
    </div>
    <button class="submit-btn" onclick="window.location='dashboard.html'">Login →</button>
    <div class="divider">ya</div>
    <button class="google-btn">🌐 Google se login karo</button>
  </div>

  <!-- Register Form -->
  <div id="registerForm" style="display:none">
    <div class="form-group">
      <label>Naam</label>
      <input type="text" placeholder="Tumhara naam">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="tumhari@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" placeholder="Strong password banao">
    </div>
    <button class="submit-btn" onclick="window.location='dashboard.html'">Account Banao →</button>
    <div class="divider">ya</div>
    <button class="google-btn">🌐 Google se register karo</button>
  </div>
</div>

<script>
  function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  }
</script>
</body>
</html>
